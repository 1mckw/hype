name: Telegram Consensus + HTML Report

on:
  schedule:
    # Check every 4 hours for 4H / 24H consensus + HTML report
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force send 4H consensus + HTML report now
        type: boolean
        default: true
      force_24h:
        description: Also force send 24H consensus
        type: boolean
        default: false

concurrency:
  group: telegram-consensus-alerts
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore data caches
        uses: actions/cache@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
          key: hl-data-v2-${{ hashFiles('output/leaderboard_cache.json', 'output/fills_cache.json', 'output/profiles_cache.json') }}
          restore-keys: |
            hl-data-v2-

      - name: Restore telegram state
        uses: actions/cache@v4
        with:
          path: output/telegram_state.json
          key: hl-state-v2-${{ hashFiles('output/telegram_state.json') }}
          restore-keys: |
            hl-state-v2-

      - name: Scan and push consensus + HTML report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLDRUSH_API_KEY: ${{ secrets.GOLDRUSH_API_KEY }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          FORCE_24H: ${{ github.event_name == 'workflow_dispatch' && inputs.force_24h }}
        run: |
          mkdir -p output
          ARGS=(--gha --output-dir output --workers 8)
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ "$FORCE_24H" = "true" ]; then ARGS+=(--force-24h); fi
          python telegram_bot.py "${ARGS[@]}"

      - name: Save data caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
          key: hl-data-v2-${{ hashFiles('output/leaderboard_cache.json', 'output/fills_cache.json', 'output/profiles_cache.json') }}

      - name: Save telegram state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/telegram_state.json
          key: hl-state-v2-${{ hashFiles('output/telegram_state.json') }}

      - name: Upload telegram state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-state
          path: output/telegram_state.json
          if-no-files-found: ignore
          retention-days: 30
