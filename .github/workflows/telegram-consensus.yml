name: Telegram Trade Alerts

on:
  schedule:
    # Poll every 15 minutes for new trades
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: telegram-trade-alerts
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/telegram_state.json
          key: hl-cache-${{ github.run_id }}
          restore-keys: |
            hl-cache-

      - name: Scan and alert new trades
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLDRUSH_API_KEY: ${{ secrets.GOLDRUSH_API_KEY }}
        run: python telegram_bot.py --gha --output-dir output --workers 8
