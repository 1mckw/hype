name: Telegram Consensus + HTML Report

on:
  schedule:
    # Hourly check; telegram_bot gates 4H/24H sends by UTC bucket (GitHub cron is often delayed)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force send 4H consensus + HTML report now
        type: boolean
        default: true
      force_24h:
        description: Also force send 24H consensus
        type: boolean
        default: false

concurrency:
  group: telegram-consensus-alerts
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare output dir
        run: mkdir -p output

      - name: Restore data caches
        uses: actions/cache/restore@v5
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
          key: hl-data-v2
          restore-keys: |
            hl-data-v2

      - name: Restore telegram state
        uses: actions/cache/restore@v5
        with:
          path: output/telegram_state.json
          key: hl-state-v2
          restore-keys: |
            hl-state-v2

      - name: Scan and push consensus + HTML report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLDRUSH_API_KEY: ${{ secrets.GOLDRUSH_API_KEY }}
        run: |
          set -euo pipefail
          ARGS=(--gha --output-dir output --workers 8)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_24h }}" = "true" ]; then
            ARGS+=(--force-24h)
          fi
          python telegram_bot.py "${ARGS[@]}"

      - name: Save data caches
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
          key: hl-data-v2-${{ github.run_id }}

      - name: Save telegram state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: output/telegram_state.json
          key: hl-state-v2-${{ github.run_id }}

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ github.run_id }}
          path: output/report.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload telegram state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: telegram-state-${{ github.run_id }}
          path: output/telegram_state.json
          if-no-files-found: ignore
          retention-days: 30
