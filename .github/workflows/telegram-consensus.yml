name: Telegram HTML Report

on:
  schedule:
    # Check every 4 hours for 4H / 24H report
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force send HTML report now
        type: boolean
        default: true
      force_24h:
        description: Also update 24H schedule bucket
        type: boolean
        default: false

concurrency:
  group: telegram-consensus-alerts
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
            output/telegram_state.json
          key: hl-cache-v1
          restore-keys: |
            hl-cache-v1

      - name: Scan and push HTML report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLDRUSH_API_KEY: ${{ secrets.GOLDRUSH_API_KEY }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          FORCE_24H: ${{ github.event_name == 'workflow_dispatch' && inputs.force_24h }}
        run: |
          ARGS=(--gha --output-dir output --workers 8)
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ "$FORCE_24H" = "true" ]; then ARGS+=(--force-24h); fi
          python telegram_bot.py "${ARGS[@]}"

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/profiles_cache.json
            output/telegram_state.json
          key: hl-cache-v1
