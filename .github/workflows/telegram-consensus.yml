name: Telegram Consensus Alerts

on:
  schedule:
    # Check every 4 hours for 4H / 24H consensus
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: telegram-consensus-alerts
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/telegram_state.json
          key: hl-cache-v1
          restore-keys: |
            hl-cache-v1

      - name: Scan and push consensus
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLDRUSH_API_KEY: ${{ secrets.GOLDRUSH_API_KEY }}
        run: python telegram_bot.py --gha --output-dir output --workers 8

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/leaderboard_cache.json
            output/fills_cache.json
            output/telegram_state.json
          key: hl-cache-v1
